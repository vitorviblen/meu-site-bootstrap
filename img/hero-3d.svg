    <linearGradient id="bumperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2a"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <radialGradient id="headBeam" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="25%" stop-color="#bff2ff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#003478" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="headCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ddf6ff"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tireGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f3a"/>
      <stop offset="50%" stop-color="#0a0c12"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcd4e6"/>
      <stop offset="50%" stop-color="#5a6c80"/>
      <stop offset="100%" stop-color="#1a2230"/>
    </linearGradient>
    <linearGradient id="hoodHighlight" x1="0" y1="0" x2="1" y2="0">
