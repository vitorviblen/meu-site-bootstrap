      <line x1="560" y1="425" x2="1040" y2="425"/>
      <line x1="560" y1="440" x2="1040" y2="440"/>
      <line x1="560" y1="455" x2="1040" y2="455"/>
      <line x1="560" y1="470" x2="1040" y2="470"/>
      <line x1="560" y1="485" x2="1040" y2="485"/>
