    <circle cx="250" cy="80" r="1"/>
    <circle cx="380" cy="160" r="1.5"/>
    <circle cx="1300" cy="100" r="1.2"/>
    <circle cx="1450" cy="180" r="1.5"/>
    <circle cx="1520" cy="60" r="1"/>
    <circle cx="80" cy="320" r="1"/>
