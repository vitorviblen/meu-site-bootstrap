    <circle cx="580" cy="540" r="5" fill="#ffffff"/>
    <circle cx="1020" cy="540" r="12" fill="#00d4ff" opacity="0.6" filter="url(#softGlow)"/>
    <circle cx="1020" cy="540" r="5" fill="#ffffff"/>

