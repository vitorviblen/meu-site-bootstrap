<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" width="1600" height="700" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Caminhao Scania em perspectiva 3/4 frontal com farois acesos">
  <defs>
    <radialGradient id="bgRad" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#0a1a2f"/>
      <stop offset="55%" stop-color="#050a18"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="60%" stop-color="#001a33" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="cabFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3b6f"/>
      <stop offset="45%" stop-color="#0a2a55"/>
      <stop offset="100%" stop-color="#031024"/>
    </linearGradient>
    <linearGradient id="cabSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#08254a"/>
      <stop offset="60%" stop-color="#0e3b6f"/>
      <stop offset="100%" stop-color="#163f7f"/>
    </linearGradient>
    <linearGradient id="windshield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001428"/>
      <stop offset="50%" stop-color="#00405f"/>
      <stop offset="100%" stop-color="#0086b8"/>
    </linearGradient>
    <linearGradient id="grilleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#000000"/>
