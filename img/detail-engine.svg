<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Detalhe tecnico de motor V8 Scania estilizado">
  <defs>
    <radialGradient id="bgE" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1a2f"/>
      <stop offset="55%" stop-color="#050a18"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="metal" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#dde6ee"/>
      <stop offset="40%" stop-color="#8aa0b8"/>
      <stop offset="80%" stop-color="#3a4658"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </radialGradient>
    <radialGradient id="metalDark" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5a6c80"/>
      <stop offset="50%" stop-color="#1a2230"/>
      <stop offset="100%" stop-color="#000408"/>
    </radialGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3445"/>
      <stop offset="50%" stop-color="#15181f"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="pistonG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dde6ee"/>
      <stop offset="40%" stop-color="#8aa0b8"/>
      <stop offset="100%" stop-color="#1a2230"/>
    </linearGradient>
    <linearGradient id="boltG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aab8c8"/>
      <stop offset="100%" stop-color="#1a2230"/>
    </linearGradient>
    <radialGradient id="gaugeG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001428"/>
      <stop offset="70%" stop-color="#000814"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="neonRing" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="92%" stop-color="#00d4ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaaaa"/>
      <stop offset="40%" stop-color="#e30613"/>
      <stop offset="100%" stop-color="#3a0008"/>
    </radialGradient>
    <filter id="glowE" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowEStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowE"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgE)"/>

  <!-- background concentric gauge rings -->
  <g fill="none">
    <circle cx="400" cy="300" r="280" stroke="#00d4ff" stroke-opacity="0.08"/>
    <circle cx="400" cy="300" r="240" stroke="#00d4ff" stroke-opacity="0.12"/>
    <circle cx="400" cy="300" r="200" stroke="#00d4ff" stroke-opacity="0.15"/>
    <circle cx="400" cy="300" r="160" stroke="#00d4ff" stroke-opacity="0.20"/>
  </g>
  <!-- gauge ticks -->
  <g stroke="#00d4ff" stroke-opacity="0.5" stroke-width="1">
    <line x1="400" y1="40" x2="400" y2="60"/>
    <line x1="400" y1="540" x2="400" y2="560"/>
    <line x1="140" y1="300" x2="160" y2="300"/>
    <line x1="640" y1="300" x2="660" y2="300"/>
    <line x1="216" y1="116" x2="230" y2="130"/>
    <line x1="570" y1="130" x2="584" y2="116"/>
    <line x1="216" y1="484" x2="230" y2="470"/>
    <line x1="570" y1="470" x2="584" y2="484"/>
  </g>
  <g stroke="#00d4ff" stroke-opacity="0.25" stroke-width="0.6">
    <line x1="400" y1="60" x2="400" y2="75"/>
    <line x1="450" y1="65" x2="448" y2="80"/>
    <line x1="500" y1="80" x2="495" y2="95"/>
    <line x1="350" y1="65" x2="352" y2="80"/>
    <line x1="300" y1="80" x2="305" y2="95"/>
    <line x1="540" y1="120" x2="530" y2="130"/>
    <line x1="260" y1="120" x2="270" y2="130"/>
  </g>

  <!-- big arc gauge top -->
  <path d="M 200,300 A 200,200 0 0 1 600,300" stroke="#00d4ff" stroke-width="2" fill="none" filter="url(#glowE)" opacity="0.9"/>
  <path d="M 200,300 A 200,200 0 0 1 500,135" stroke="#e30613" stroke-width="3" fill="none" filter="url(#glowE)" opacity="0.85"/>

  <!-- gauge label -->
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#00d4ff" letter-spacing="4">TORQUE 3700 Nm</text>

  <!-- ENGINE BLOCK center -->
  <g>
    <!-- main block -->
    <rect x="240" y="220" width="320" height="200" rx="8" fill="url(#blockGrad)" stroke="#1a2230"/>
    <!-- highlight -->
    <rect x="244" y="224" width="312" height="6" fill="#3a4658" opacity="0.6"/>
    <!-- horizontal ridges -->
    <g stroke="#0a0c12" stroke-width="1">
      <line x1="240" y1="260" x2="560" y2="260"/>
      <line x1="240" y1="290" x2="560" y2="290"/>
      <line x1="240" y1="320" x2="560" y2="320"/>
      <line x1="240" y1="350" x2="560" y2="350"/>
      <line x1="240" y1="380" x2="560" y2="380"/>
    </g>
    <g stroke="#5a6c80" stroke-width="0.4" stroke-opacity="0.5">
      <line x1="240" y1="262" x2="560" y2="262"/>
      <line x1="240" y1="292" x2="560" y2="292"/>
      <line x1="240" y1="322" x2="560" y2="322"/>
      <line x1="240" y1="352" x2="560" y2="352"/>
      <line x1="240" y1="382" x2="560" y2="382"/>
    </g>

    <!-- V8 cylinders top (4 left + 4 right in V formation) -->
    <g>
      <!-- left bank -->
      <ellipse cx="290" cy="220" rx="28" ry="14" fill="url(#metal)"/>
      <ellipse cx="290" cy="218" rx="20" ry="8" fill="url(#metalDark)"/>
      <circle cx="290" cy="218" r="4" fill="#0a0c12"/>
      <ellipse cx="350" cy="220" rx="28" ry="14" fill="url(#metal)"/>
      <ellipse cx="350" cy="218" rx="20" ry="8" fill="url(#metalDark)"/>
      <circle cx="350" cy="218" r="4" fill="#0a0c12"/>
      <!-- right bank -->
      <ellipse cx="450" cy="220" rx="28" ry="14" fill="url(#metal)"/>
      <ellipse cx="450" cy="218" rx="20" ry="8" fill="url(#metalDark)"/>
      <circle cx="450" cy="218" r="4" fill="#0a0c12"/>
      <ellipse cx="510" cy="220" rx="28" ry="14" fill="url(#metal)"/>
      <ellipse cx="510" cy="218" rx="20" ry="8" fill="url(#metalDark)"/>
      <circle cx="510" cy="218" r="4" fill="#0a0c12"/>
    </g>

    <!-- pistons protruding from top -->
    <g>
      <rect x="282" y="195" width="16" height="20" rx="2" fill="url(#pistonG)"/>
      <rect x="342" y="195" width="16" height="20" rx="2" fill="url(#pistonG)"/>
      <rect x="442" y="195" width="16" height="20" rx="2" fill="url(#pistonG)"/>
      <rect x="502" y="195" width="16" height="20" rx="2" fill="url(#pistonG)"/>
    </g>

    <!-- spark glow on each cylinder -->
    <g filter="url(#glowE)">
      <circle cx="290" cy="218" r="3" fill="#00d4ff" opacity="0.9"/>
      <circle cx="350" cy="218" r="3" fill="#00d4ff" opacity="0.9"/>
      <circle cx="450" cy="218" r="3" fill="#e30613" opacity="0.9"/>
      <circle cx="510" cy="218" r="3" fill="#e30613" opacity="0.9"/>
    </g>

    <!-- bolts around block edges -->
    <g fill="url(#boltG)">
      <circle cx="252" cy="232" r="3"/>
      <circle cx="252" cy="408" r="3"/>
      <circle cx="548" cy="232" r="3"/>
      <circle cx="548" cy="408" r="3"/>
      <circle cx="252" cy="320" r="3"/>
      <circle cx="548" cy="320" r="3"/>
      <circle cx="320" cy="408" r="2.5"/>
      <circle cx="400" cy="408" r="2.5"/>
      <circle cx="480" cy="408" r="2.5"/>
      <circle cx="320" cy="232" r="2.5"/>
      <circle cx="400" cy="232" r="2.5"/>
      <circle cx="480" cy="232" r="2.5"/>
    </g>

    <!-- side intake pipes -->
    <g>
      <path d="M 240,300 Q 200,300 200,340 L 200,380" stroke="#3a4658" stroke-width="10" fill="none"/>
      <path d="M 240,300 Q 200,300 200,340 L 200,380" stroke="#1a2230" stroke-width="6" fill="none"/>
      <circle cx="200" cy="385" r="8" fill="url(#metalDark)"/>
      <path d="M 560,300 Q 600,300 600,340 L 600,380" stroke="#3a4658" stroke-width="10" fill="none"/>
      <path d="M 560,300 Q 600,300 600,340 L 600,380" stroke="#1a2230" stroke-width="6" fill="none"/>
      <circle cx="600" cy="385" r="8" fill="url(#metalDark)"/>
    </g>

    <!-- V8 badge center -->
    <g>
      <rect x="360" y="335" width="80" height="40" rx="4" fill="#000408" stroke="#e30613" stroke-width="1.5"/>
      <text x="400" y="365" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#e30613" letter-spacing="2">V8</text>
    </g>

    <!-- scania text small -->
    <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#00d4ff" letter-spacing="3">SCANIA POWERED</text>

    <!-- block bottom shadow -->
    <rect x="240" y="415" width="320" height="6" fill="#000" opacity="0.6"/>
  </g>

  <!-- inner neon ring -->
  <circle cx="400" cy="300" r="180" fill="url(#neonRing)" opacity="0.45"/>

  <!-- floating data points -->
  <g font-family="Arial, sans-serif" fill="#00d4ff">
    <g>
      <circle cx="150" cy="200" r="3" fill="#00d4ff" filter="url(#glowE)"/>
      <line x1="153" y1="200" x2="220" y2="200" stroke="#00d4ff" stroke-width="0.6"/>
      <text x="100" y="195" font-size="10" font-weight="700" letter-spacing="1">770 HP</text>
      <text x="100" y="208" font-size="7" fill="#5a8aa8" letter-spacing="1">PEAK POWER</text>
    </g>
    <g>
      <circle cx="650" cy="200" r="3" fill="#00d4ff" filter="url(#glowE)"/>
      <line x1="580" y1="200" x2="647" y2="200" stroke="#00d4ff" stroke-width="0.6"/>
      <text x="660" y="195" font-size="10" font-weight="700" letter-spacing="1">16.4 L</text>
      <text x="660" y="208" font-size="7" fill="#5a8aa8" letter-spacing="1">DISPLACEMENT</text>
    </g>
    <g>
      <circle cx="150" cy="430" r="3" fill="#e30613" filter="url(#glowE)"/>
      <line x1="153" y1="430" x2="220" y2="430" stroke="#e30613" stroke-width="0.6" opacity="0.7"/>
      <text x="100" y="425" font-size="10" font-weight="700" fill="#ff5566" letter-spacing="1">3700 Nm</text>
      <text x="100" y="438" font-size="7" fill="#aa6066" letter-spacing="1">TORQUE</text>
    </g>
    <g>
      <circle cx="650" cy="430" r="3" fill="#00d4ff" filter="url(#glowE)"/>
      <line x1="580" y1="430" x2="647" y2="430" stroke="#00d4ff" stroke-width="0.6"/>
      <text x="660" y="425" font-size="10" font-weight="700" letter-spacing="1">EURO 6</text>
      <text x="660" y="438" font-size="7" fill="#5a8aa8" letter-spacing="1">EMISSIONS</text>
    </g>
  </g>

  <!-- bottom rpm bar -->
  <g transform="translate(200,500)">
    <rect x="0" y="0" width="400" height="14" rx="2" fill="#000408" stroke="#1a2230"/>
    <rect x="2" y="2" width="280" height="10" rx="1" fill="#00d4ff" opacity="0.7" filter="url(#glowE)"/>
    <rect x="280" y="2" width="60" height="10" rx="1" fill="#ff9900" opacity="0.8" filter="url(#glowE)"/>
    <rect x="340" y="2" width="58" height="10" rx="1" fill="#e30613" opacity="0.85" filter="url(#glowE)"/>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#00d4ff" letter-spacing="2">RPM</text>
    <text x="400" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#e30613" letter-spacing="2">REDLINE 2100</text>
  </g>

  <!-- red-hot exhaust glow -->
  <ellipse cx="200" cy="400" rx="14" ry="6" fill="url(#redCore)" filter="url(#glowEStrong)" opacity="0.85"/>
  <ellipse cx="600" cy="400" rx="14" ry="6" fill="url(#redCore)" filter="url(#glowEStrong)" opacity="0.85"/>

  <!-- corner brackets (tech feel) -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.8">
    <polyline points="30,30 30,60 60,60"/>
    <polyline points="770,30 770,60 740,60"/>
    <polyline points="30,570 30,540 60,540"/>
    <polyline points="770,570 770,540 740,540"/>
  </g>
  <g font-family="Arial, sans-serif" fill="#00d4ff" font-size="9" letter-spacing="2">
    <text x="40" y="50" font-weight="700">SCANIA-V8</text>
    <text x="760" y="50" text-anchor="end" font-weight="700">DC16</text>
    <text x="40" y="555" font-weight="700">TECH-SPEC</text>
    <text x="760" y="555" text-anchor="end" font-weight="700">2026 / REV.A</text>
  </g>

  <!-- particles -->
  <g fill="#00d4ff" opacity="0.5">
    <circle cx="120" cy="120" r="1.2"/>
    <circle cx="680" cy="120" r="1.2"/>
    <circle cx="100" cy="500" r="1.2"/>
    <circle cx="700" cy="500" r="1.2"/>
  </g>
</svg>
