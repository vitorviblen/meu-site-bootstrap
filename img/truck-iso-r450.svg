<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Scania R 450 em vista isometrica">
  <defs>
    <radialGradient id="bgR" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0a1a2f"/>
      <stop offset="65%" stop-color="#050a18"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="cabBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c5aa8"/>
      <stop offset="50%" stop-color="#0e3b6f"/>
      <stop offset="100%" stop-color="#031024"/>
    </linearGradient>
    <linearGradient id="cabBlueSide" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0%" stop-color="#0a2a55"/>
      <stop offset="50%" stop-color="#1c5aa8"/>
      <stop offset="100%" stop-color="#0e3b6f"/>
    </linearGradient>
    <linearGradient id="cabRoof" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#163f7f"/>
      <stop offset="100%" stop-color="#0a2a55"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="40%" stop-color="#c8d4e2"/>
      <stop offset="100%" stop-color="#5a6c80"/>
    </linearGradient>
    <linearGradient id="boxSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8aa0b8"/>
      <stop offset="100%" stop-color="#3a4658"/>
    </linearGradient>
    <linearGradient id="boxTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dde6ee"/>
      <stop offset="100%" stop-color="#a8b8c8"/>
    </linearGradient>
    <linearGradient id="windIso" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001428"/>
      <stop offset="60%" stop-color="#00405f"/>
      <stop offset="100%" stop-color="#0086b8"/>
    </linearGradient>
    <linearGradient id="tireG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f3a"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <radialGradient id="rimG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dde6ee"/>
      <stop offset="60%" stop-color="#5a6c80"/>
      <stop offset="100%" stop-color="#1a2230"/>
    </radialGradient>
    <radialGradient id="head" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#bff2ff"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowR" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="glowR2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowR"><feGaussianBlur stdDeviation="12"/></filter>
    <pattern id="dotsR" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#00d4ff" fill-opacity="0.25"/>
    </pattern>
  </defs>

  <rect width="1200" height="700" fill="url(#bgR)"/>
  <rect width="1200" height="700" fill="url(#dotsR)"/>

  <g stroke="#00d4ff" stroke-opacity="0.12" fill="none">
    <line x1="0" y1="570" x2="1200" y2="450"/>
    <line x1="0" y1="610" x2="1200" y2="490"/>
    <line x1="0" y1="650" x2="1200" y2="530"/>
    <line x1="100" y1="700" x2="1100" y2="430"/>
  </g>

  <ellipse cx="620" cy="600" rx="450" ry="30" fill="#000" opacity="0.85" filter="url(#shadowR)"/>
  <ellipse cx="620" cy="600" rx="380" ry="14" fill="#00d4ff" opacity="0.10" filter="url(#shadowR)"/>

  <!-- BOX (trailer) - isometric -->
  <g>
    <polygon points="610,180 1080,180 1130,230 660,230" fill="url(#boxTop)"/>
    <polygon points="660,230 1130,230 1130,520 660,520" fill="url(#boxGrad)"/>
    <polygon points="1130,230 1180,260 1180,490 1130,520" fill="url(#boxSide)"/>
    <line x1="660" y1="240" x2="1130" y2="240" stroke="#5a6c80" stroke-width="0.8"/>
    <line x1="660" y1="510" x2="1130" y2="510" stroke="#5a6c80" stroke-width="0.8"/>
    <g stroke="#5a6c80" stroke-width="0.6" stroke-opacity="0.7">
      <line x1="760" y1="230" x2="760" y2="520"/>
      <line x1="860" y1="230" x2="860" y2="520"/>
      <line x1="960" y1="230" x2="960" y2="520"/>
      <line x1="1060" y1="230" x2="1060" y2="520"/>
    </g>
    <line x1="1130" y1="375" x2="1180" y2="375" stroke="#3a4658"/>
    <rect x="700" y="270" width="380" height="180" fill="#0e3b6f" opacity="0.0"/>
    <text x="890" y="395" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="78" font-weight="900" fill="#0a1a2f" letter-spacing="6">SCANIA</text>
    <rect x="660" y="455" width="470" height="14" fill="#e30613"/>
    <rect x="660" y="469" width="470" height="3" fill="#5a0008"/>
    <polygon points="1130,455 1180,485 1180,499 1130,469" fill="#e30613"/>
    <text x="700" y="510" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#3a4658" letter-spacing="3">R 450 - HEAVY DUTY</text>
  </g>

  <!-- CAB - R 450 -->
  <g>
    <polygon points="290,260 600,260 640,300 330,300" fill="url(#cabRoof)"/>
    <polygon points="330,300 640,300 640,530 330,530" fill="url(#cabBlue)"/>
    <polygon points="640,300 690,335 690,510 640,530" fill="url(#cabBlueSide)"/>
    <line x1="640" y1="300" x2="640" y2="530" stroke="#031024" stroke-width="1"/>

    <!-- windshield -->
    <polygon points="350,310 620,310 630,395 360,395" fill="url(#windIso)"/>
    <polygon points="360,318 480,318 430,388 360,388" fill="#ffffff" opacity="0.08"/>
    <line x1="490" y1="310" x2="490" y2="395" stroke="#001020" stroke-width="1.5"/>

    <!-- side window -->
    <polygon points="640,310 685,340 685,395 640,395" fill="url(#windIso)" opacity="0.9"/>

    <!-- door -->
    <line x1="490" y1="395" x2="490" y2="530" stroke="#031024" stroke-width="1"/>
    <line x1="350" y1="430" x2="640" y2="430" stroke="#031024" stroke-width="0.5"/>
    <rect x="460" y="455" width="20" height="3" fill="#163f7f"/>

    <!-- red stripe -->
    <rect x="330" y="405" width="310" height="6" fill="#e30613"/>
    <polygon points="640,405 690,440 690,446 640,411" fill="#e30613"/>

    <!-- grille -->
    <rect x="340" y="475" width="290" height="50" fill="#0a0f1a"/>
    <g stroke="#163f7f" stroke-width="0.6">
      <line x1="340" y1="485" x2="630" y2="485"/>
      <line x1="340" y1="495" x2="630" y2="495"/>
      <line x1="340" y1="505" x2="630" y2="505"/>
      <line x1="340" y1="515" x2="630" y2="515"/>
    </g>
    <rect x="455" y="488" width="60" height="14" rx="2" fill="#0a0f1a" stroke="#00d4ff" stroke-opacity="0.5"/>
    <text x="485" y="499" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="900" fill="#fff" letter-spacing="1.5">SCANIA</text>

    <!-- bumper -->
    <rect x="330" y="525" width="310" height="35" fill="#1a1f2a"/>
    <polygon points="640,525 690,510 690,545 640,560" fill="#0a0c12"/>

    <!-- headlights -->
    <ellipse cx="370" cy="465" rx="20" ry="10" fill="url(#head)" filter="url(#glowR2)"/>
    <ellipse cx="370" cy="465" rx="10" ry="5" fill="#ffffff"/>
    <ellipse cx="600" cy="465" rx="20" ry="10" fill="url(#head)" filter="url(#glowR2)"/>
    <ellipse cx="600" cy="465" rx="10" ry="5" fill="#ffffff"/>

    <!-- roof lights -->
    <g filter="url(#glowR2)">
      <circle cx="400" cy="275" r="3" fill="#ff9900"/>
      <circle cx="460" cy="275" r="3" fill="#ff9900"/>
      <circle cx="520" cy="275" r="3" fill="#ff9900"/>
      <circle cx="580" cy="275" r="3" fill="#ff9900"/>
    </g>
    <!-- mirror -->
    <rect x="305" y="330" width="15" height="45" fill="#0a2a55" stroke="#163f7f"/>
    <line x1="320" y1="345" x2="345" y2="335" stroke="#0a2a55" stroke-width="2"/>
    <!-- exhaust stack -->
    <rect x="660" y="240" width="14" height="100" fill="#3a4658" stroke="#1a2230"/>
    <ellipse cx="667" cy="240" rx="7" ry="3" fill="#1a2230"/>
  </g>

  <!-- TIRES with depth -->
  <g>
    <ellipse cx="420" cy="585" rx="46" ry="18" fill="url(#tireG)"/>
    <ellipse cx="420" cy="582" rx="30" ry="11" fill="url(#rimG)"/>
    <circle cx="420" cy="582" r="4" fill="#0a0c12"/>
    <ellipse cx="555" cy="585" rx="46" ry="18" fill="url(#tireG)"/>
    <ellipse cx="555" cy="582" rx="30" ry="11" fill="url(#rimG)"/>
    <circle cx="555" cy="582" r="4" fill="#0a0c12"/>
    <ellipse cx="780" cy="585" rx="46" ry="18" fill="url(#tireG)"/>
    <ellipse cx="780" cy="582" rx="30" ry="11" fill="url(#rimG)"/>
    <circle cx="780" cy="582" r="4" fill="#0a0c12"/>
    <ellipse cx="900" cy="585" rx="46" ry="18" fill="url(#tireG)"/>
    <ellipse cx="900" cy="582" rx="30" ry="11" fill="url(#rimG)"/>
    <circle cx="900" cy="582" r="4" fill="#0a0c12"/>
    <ellipse cx="1020" cy="585" rx="46" ry="18" fill="url(#tireG)"/>
    <ellipse cx="1020" cy="582" rx="30" ry="11" fill="url(#rimG)"/>
    <circle cx="1020" cy="582" r="4" fill="#0a0c12"/>
  </g>

  <!-- chassis bar -->
  <rect x="340" y="560" width="800" height="6" fill="#1a2230"/>
  <rect x="340" y="566" width="800" height="2" fill="#00d4ff" opacity="0.2"/>

  <!-- ground reflection (faded mirror under truck) -->
  <g opacity="0.18">
    <polygon points="660,600 1130,600 1130,640 660,640" fill="#c8d4e2"/>
    <polygon points="330,600 640,600 640,640 330,640" fill="#1c5aa8"/>
  </g>

  <!-- corner badge -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="160" height="48" rx="4" fill="#0a0f1a" stroke="#00d4ff" stroke-opacity="0.6"/>
    <text x="14" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#00d4ff" letter-spacing="2">SCANIA SERIES</text>
    <text x="14" y="40" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#fff" letter-spacing="3">R 450</text>
  </g>

  <g fill="#00d4ff" opacity="0.45">
    <circle cx="100" cy="100" r="1.2"/>
    <circle cx="200" cy="60" r="1"/>
    <circle cx="1100" cy="120" r="1.4"/>
    <circle cx="1150" cy="60" r="1"/>
  </g>
</svg>
