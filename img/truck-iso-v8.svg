<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Scania V8 isometrico preto com acentos vermelhos">
  <defs>
    <radialGradient id="bgV" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1a0508"/>
      <stop offset="55%" stop-color="#080a14"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="cabBlack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f3a"/>
      <stop offset="45%" stop-color="#10131c"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="cabBlackSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0c12"/>
      <stop offset="60%" stop-color="#1a1f2a"/>
      <stop offset="100%" stop-color="#2a2f3a"/>
    </linearGradient>
    <linearGradient id="cabBlackRoof" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1f2a"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </linearGradient>
    <linearGradient id="boxV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f3a"/>
      <stop offset="50%" stop-color="#15181f"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="boxVSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1f2a"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="boxVTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a4050"/>
      <stop offset="100%" stop-color="#15181f"/>
    </linearGradient>
    <linearGradient id="redStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a0008"/>
      <stop offset="50%" stop-color="#e30613"/>
      <stop offset="100%" stop-color="#ff3344"/>
    </linearGradient>
    <linearGradient id="windV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000814"/>
      <stop offset="50%" stop-color="#1a1f2a"/>
      <stop offset="100%" stop-color="#3a0008"/>
    </linearGradient>
    <linearGradient id="tireV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2f3a"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <radialGradient id="rimV" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aa1422"/>
      <stop offset="50%" stop-color="#5a0008"/>
      <stop offset="100%" stop-color="#1a0004"/>
    </radialGradient>
    <radialGradient id="headV" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ffcccc"/>
      <stop offset="100%" stop-color="#e30613" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowV" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadowV"><feGaussianBlur stdDeviation="12"/></filter>
    <pattern id="dotsV" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#e30613" fill-opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="700" fill="url(#bgV)"/>
  <rect width="1200" height="700" fill="url(#dotsV)"/>

  <!-- aggressive diagonal lines -->
  <g stroke="#e30613" stroke-opacity="0.18" stroke-width="2">
    <line x1="0" y1="100" x2="300" y2="0"/>
    <line x1="900" y1="700" x2="1200" y2="600"/>
  </g>
  <g stroke="#00d4ff" stroke-opacity="0.10" fill="none">
    <line x1="0" y1="570" x2="1200" y2="450"/>
    <line x1="0" y1="620" x2="1200" y2="500"/>
    <line x1="100" y1="700" x2="1100" y2="430"/>
  </g>

  <ellipse cx="620" cy="600" rx="450" ry="30" fill="#000" opacity="0.9" filter="url(#shadowV)"/>
  <ellipse cx="620" cy="610" rx="380" ry="12" fill="#e30613" opacity="0.18" filter="url(#shadowV)"/>

  <!-- BOX trailer -->
  <g>
    <polygon points="610,180 1080,180 1130,230 660,230" fill="url(#boxVTop)"/>
    <polygon points="660,230 1130,230 1130,520 660,520" fill="url(#boxV)"/>
    <polygon points="1130,230 1180,260 1180,490 1130,520" fill="url(#boxVSide)"/>
    <g stroke="#3a4050" stroke-width="0.6" stroke-opacity="0.8">
      <line x1="760" y1="230" x2="760" y2="520"/>
      <line x1="860" y1="230" x2="860" y2="520"/>
      <line x1="960" y1="230" x2="960" y2="520"/>
      <line x1="1060" y1="230" x2="1060" y2="520"/>
    </g>
    <line x1="660" y1="240" x2="1130" y2="240" stroke="#3a4050" stroke-width="0.8"/>
    <line x1="660" y1="510" x2="1130" y2="510" stroke="#3a4050" stroke-width="0.8"/>

    <!-- SCANIA logo -->
    <text x="890" y="330" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="50" font-weight="900" fill="#ffffff" letter-spacing="6">SCANIA</text>
    <!-- big V8 text on side -->
    <g filter="url(#redGlow)">
      <text x="890" y="430" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" fill="#e30613" letter-spacing="2" stroke="#ffffff" stroke-width="1">V8</text>
    </g>
    <text x="890" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#ff5566" letter-spacing="6">POWER UNLEASHED</text>
    <rect x="660" y="490" width="470" height="14" fill="url(#redStripe)"/>
    <polygon points="1130,490 1180,520 1180,534 1130,504" fill="#7a0008"/>
    <rect x="660" y="504" width="470" height="2" fill="#3a0008"/>
  </g>

  <!-- CAB - V8 black aggressive -->
  <g>
    <polygon points="290,240 600,240 640,280 330,280" fill="url(#cabBlackRoof)"/>
    <polygon points="330,280 640,280 640,530 330,530" fill="url(#cabBlack)"/>
    <polygon points="640,280 690,315 690,510 640,530" fill="url(#cabBlackSide)"/>
    <line x1="640" y1="280" x2="640" y2="530" stroke="#000" stroke-width="1"/>

    <!-- aggressive angular windshield -->
    <polygon points="350,290 620,290 630,390 360,390" fill="url(#windV)"/>
    <polygon points="360,298 450,298 410,385 360,385" fill="#ffffff" opacity="0.08"/>
    <line x1="490" y1="290" x2="490" y2="390" stroke="#000" stroke-width="1.5"/>

    <!-- side window -->
    <polygon points="640,290 685,322 685,390 640,390" fill="url(#windV)" opacity="0.9"/>

    <!-- door split -->
    <line x1="490" y1="390" x2="490" y2="530" stroke="#000" stroke-width="1"/>
    <line x1="350" y1="425" x2="640" y2="425" stroke="#000" stroke-width="0.5"/>

    <!-- aggressive red accent stripes -->
    <rect x="330" y="395" width="310" height="3" fill="#e30613"/>
    <rect x="330" y="400" width="310" height="8" fill="url(#redStripe)" filter="url(#redGlow)"/>
    <polygon points="640,400 690,432 690,440 640,408" fill="#e30613"/>

    <!-- side V8 badge -->
    <g transform="translate(370,440)">
      <rect x="0" y="0" width="60" height="32" rx="3" fill="#0a0c12" stroke="#e30613" stroke-width="1.5"/>
      <text x="30" y="22" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#e30613" letter-spacing="2">V8</text>
    </g>

    <!-- aggressive grille (X pattern) -->
    <rect x="340" y="465" width="290" height="60" fill="#000000"/>
    <g stroke="#e30613" stroke-width="0.8" stroke-opacity="0.85">
      <line x1="340" y1="465" x2="630" y2="525"/>
      <line x1="630" y1="465" x2="340" y2="525"/>
    </g>
    <g stroke="#3a4050" stroke-width="0.6">
      <line x1="340" y1="478" x2="630" y2="478"/>
      <line x1="340" y1="491" x2="630" y2="491"/>
      <line x1="340" y1="504" x2="630" y2="504"/>
      <line x1="340" y1="517" x2="630" y2="517"/>
    </g>
    <rect x="450" y="481" width="70" height="20" rx="2" fill="#0a0c12" stroke="#e30613" stroke-opacity="0.7"/>
    <text x="485" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="900" fill="#fff" letter-spacing="1.5">SCANIA</text>

    <!-- bumper aggressive -->
    <polygon points="330,525 640,525 640,560 330,560" fill="#0a0c12"/>
    <polygon points="640,525 690,510 690,545 640,560" fill="#000"/>
    <rect x="380" y="540" width="200" height="3" fill="#e30613"/>

    <!-- headlights red glow -->
    <ellipse cx="370" cy="450" rx="20" ry="9" fill="url(#headV)" filter="url(#glowV)"/>
    <ellipse cx="370" cy="450" rx="10" ry="4" fill="#ffffff"/>
    <ellipse cx="600" cy="450" rx="20" ry="9" fill="url(#headV)" filter="url(#glowV)"/>
    <ellipse cx="600" cy="450" rx="10" ry="4" fill="#ffffff"/>
    <!-- red drl strip -->
    <rect x="345" y="438" width="55" height="2" fill="#e30613" filter="url(#redGlow)"/>
    <rect x="575" y="438" width="55" height="2" fill="#e30613" filter="url(#redGlow)"/>

    <!-- roof lights red -->
    <g filter="url(#redGlow)">
      <circle cx="400" cy="255" r="3" fill="#e30613"/>
      <circle cx="460" cy="255" r="3" fill="#e30613"/>
      <circle cx="520" cy="255" r="3" fill="#e30613"/>
      <circle cx="580" cy="255" r="3" fill="#e30613"/>
    </g>
    <!-- mirror -->
    <rect x="305" y="315" width="15" height="48" fill="#0a0c12" stroke="#1a1f2a"/>
    <line x1="320" y1="330" x2="345" y2="320" stroke="#0a0c12" stroke-width="2"/>

    <!-- twin exhaust stacks chrome -->
    <rect x="650" y="220" width="12" height="115" fill="#3a4050" stroke="#000"/>
    <rect x="666" y="220" width="12" height="115" fill="#3a4050" stroke="#000"/>
    <ellipse cx="656" cy="220" rx="6" ry="2.5" fill="#0a0c12"/>
    <ellipse cx="672" cy="220" rx="6" ry="2.5" fill="#0a0c12"/>
  </g>

  <!-- TIRES - red rims aggressive -->
  <g>
    <ellipse cx="420" cy="585" rx="46" ry="18" fill="url(#tireV)"/>
    <ellipse cx="420" cy="582" rx="30" ry="11" fill="url(#rimV)"/>
    <circle cx="420" cy="582" r="4" fill="#000"/>
    <ellipse cx="555" cy="585" rx="46" ry="18" fill="url(#tireV)"/>
    <ellipse cx="555" cy="582" rx="30" ry="11" fill="url(#rimV)"/>
    <circle cx="555" cy="582" r="4" fill="#000"/>
    <ellipse cx="780" cy="585" rx="46" ry="18" fill="url(#tireV)"/>
    <ellipse cx="780" cy="582" rx="30" ry="11" fill="url(#rimV)"/>
    <circle cx="780" cy="582" r="4" fill="#000"/>
    <ellipse cx="900" cy="585" rx="46" ry="18" fill="url(#tireV)"/>
    <ellipse cx="900" cy="582" rx="30" ry="11" fill="url(#rimV)"/>
    <circle cx="900" cy="582" r="4" fill="#000"/>
    <ellipse cx="1020" cy="585" rx="46" ry="18" fill="url(#tireV)"/>
    <ellipse cx="1020" cy="582" rx="30" ry="11" fill="url(#rimV)"/>
    <circle cx="1020" cy="582" r="4" fill="#000"/>
  </g>

  <!-- chassis -->
  <rect x="340" y="560" width="800" height="6" fill="#1a0004"/>
  <rect x="340" y="566" width="800" height="2" fill="#e30613" opacity="0.5"/>

  <!-- ground reflection -->
  <g opacity="0.16">
    <polygon points="660,600 1130,600 1130,640 660,640" fill="#15181f"/>
    <polygon points="330,600 640,600 640,640 330,640" fill="#000"/>
  </g>

  <!-- corner badge -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="170" height="52" rx="4" fill="#0a0c12" stroke="#e30613" stroke-opacity="0.8"/>
    <text x="14" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#e30613" letter-spacing="3">SCANIA V8</text>
    <text x="14" y="42" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#fff" letter-spacing="2">770 HP</text>
  </g>

  <g fill="#e30613" opacity="0.45">
    <circle cx="100" cy="100" r="1.3"/>
    <circle cx="1100" cy="120" r="1.4"/>
    <circle cx="1150" cy="60" r="1"/>
    <circle cx="200" cy="60" r="1"/>
  </g>
</svg>
